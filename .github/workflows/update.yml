name: Daily Policy Scrape

permissions:
  contents: write
  
on:
  schedule:
    - cron: '0 8 * * *'
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run scrapers
        run: python scraper/run_all.py
      
      - name: Run summariser
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        run: python summariser/summariser.py
        
      - name: Save updated data
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add data/
          git commit -m "Automated data update" || echo "No changes"
          git push